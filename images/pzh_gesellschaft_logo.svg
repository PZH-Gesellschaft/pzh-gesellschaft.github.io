<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">PZH Gesellschaft – Logo corporativo estilo financiero</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo corporativo con estilo financiero institucional similar a JPMorgan Chase o Lehman Brothers</desc>

  <defs>
    
  </defs>

  <!-- Outer frame -->
  <rect x="60" y="40" width="560" height="260" rx="0" stroke-width="0" style="fill:rgb(248, 245, 239);stroke:none;color:rgb(0, 0, 0);stroke-width:0px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Top horizontal rule -->
  <line x1="60" y1="65" x2="620" y2="65" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Bottom horizontal rule -->
  <line x1="60" y1="275" x2="620" y2="275" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Thin decorative top line -->
  <line x1="60" y1="58" x2="620" y2="58" stroke-width="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Thin decorative bottom line -->
  <line x1="60" y1="282" x2="620" y2="282" stroke-width="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Monogram box left -->
  <rect x="88" y="95" width="122" height="150" rx="0" stroke-width="1.2" style="fill:rgb(248, 245, 239);stroke:rgb(138, 104, 32);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- PZH Monogram letters -->
  <!-- P -->
  <text x="104" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="-2" style="fill:rgb(138, 104, 32);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">P</text>
  <!-- Z -->
  <text x="133" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="-2" style="fill:rgb(138, 104, 32);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">Z</text>
  <!-- H -->
  <text x="164" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" letter-spacing="-2" style="fill:rgb(138, 104, 32);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">H</text>

  <!-- Thin gold line inside monogram box top -->
  <line x1="96" y1="107" x2="202" y2="107" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(138, 104, 32);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Thin gold line inside monogram box bottom -->
  <line x1="96" y1="232" x2="202" y2="232" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(138, 104, 32);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Vertical separator between monogram and text -->
  <line x1="234" y1="95" x2="234" y2="245" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Company name -->
  <text x="256" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" letter-spacing="3" style="fill:rgb(26, 23, 16);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:38px;font-weight:700;text-anchor:start;dominant-baseline:auto">PZH</text>

  <!-- Full company name -->
  <text x="256" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" letter-spacing="5" style="fill:rgb(92, 84, 72);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:20px;font-weight:400;text-anchor:start;dominant-baseline:auto">GESELLSCHAFT</text>

  <!-- Thin rule between name and tagline -->
  <line x1="256" y1="200" x2="598" y2="200" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(138, 120, 96);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline / descriptor -->
  <text x="256" y="222" font-family="'Arial Narrow', Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="4" style="fill:rgb(92, 84, 72);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Narrow&quot;, Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">CAPITAL  ·  ADVISORY  ·  INVESTMENTS</text>

  <!-- Small ornamental diamond accent -->
  <polygon points="340,52 344,58 340,64 336,58" style="fill:rgb(138, 104, 32);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>